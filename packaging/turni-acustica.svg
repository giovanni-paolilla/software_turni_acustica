<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Calendar grid -->
  <rect x="24" y="36" width="80" height="68" rx="6" fill="none" stroke="white" stroke-width="3"/>
  <line x1="24" y1="52" x2="104" y2="52" stroke="white" stroke-width="2"/>
  <!-- Header dots (calendar pins) -->
  <circle cx="44" cy="32" r="3" fill="white"/>
  <circle cx="84" cy="32" r="3" fill="white"/>
  <!-- Grid lines -->
  <line x1="50.7" y1="52" x2="50.7" y2="104" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="77.3" y1="52" x2="77.3" y2="104" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="65" x2="104" y2="65" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="78" x2="104" y2="78" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="91" x2="104" y2="91" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Audio wave symbol -->
  <path d="M34 70 Q37 62 40 70 Q43 78 46 70" stroke="#A8D033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Video play symbol -->
  <polygon points="60,62 60,78 72,70" fill="#A8D033"/>
  <!-- Checkmark -->
  <path d="M82 72 L88 78 L98 64" stroke="#A8D033" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
